steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/graffiticode-app/console:$_TAG'
      - '-t'
      - 'gcr.io/graffiticode-app/console:latest'
      - '.'

  # Push image to Container Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - '--all-tags'
      - 'gcr.io/graffiticode-app/console'
    id: Push

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    args:
      - run
      - deploy
      - console
      - '--platform=managed'
      - '--image=gcr.io/graffiticode-app/console:$_TAG'
      - '--region=$_DEPLOY_REGION'
      - '--quiet'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--port=8080'
      # Cross-app SSO: scope the shared refresh-token cookie to the parent domain
      # so console.graffiticode.org and app.graffiticode.org share one sign-in.
      # Use --update-env-vars (additive); --set-env-vars would wipe everything
      # else (ANTHROPIC/OPENAI/Stripe/DSPY/OTEL/... set out-of-band on the service).
      - '--update-env-vars=SSO_COOKIE_DOMAIN=.graffiticode.org'
    id: Deploy
    entrypoint: gcloud

images:
  - 'gcr.io/graffiticode-app/console:$_TAG'
  - 'gcr.io/graffiticode-app/console:latest'

options:
  substitutionOption: ALLOW_LOOSE

substitutions:
  _DEPLOY_REGION: us-central1
  _TAG: latest

tags:
  - console
